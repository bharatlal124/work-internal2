<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mega Menu Fixed</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {font-family: 'Poppins', sans-serif; background: #f8f9fc;}

/* NAVBAR */
.navbar-collapse {justify-content: end;}
.navbar-nav .nav-link {
  font-weight: 500;
  padding: 18px 22px;
  transition: 0.3s;
}

.nav-link.active {
  color: #fff !important;
  background: #002A54;
  border-radius: 6px;
}

/* BELOW NAVBAR (MEGA WRAPPER) */
.mega-wrapper {
  display: none;
  opacity: 0;
  transform: translateY(10px);
  transition: 0.3s ease;
  border-top: 2px solid #106093;
}

.mega-wrapper.show {
  display: block;
  opacity: 1;
  transform: translateY(0);
}

/* MEGA DROPDOWN */
.mega-dropdown {
  border-radius: 20px;
  padding: 30px;
  background: rgba(255,255,255,0.9);
  backdrop-filter: blur(20px);
  box-shadow: 0 20px 60px rgba(0,0,0,0.08);
}

/* LEFT TABS */
.nav-pills .nav-link {
  text-align: left;
  margin-bottom: 8px;
  color: #444;
}

.nav-pills .nav-link.active {
  background: #002A54;
  color: #fff;
}

/* LINKS */
.tab-content a {
  display: inline-block;
  margin-bottom: 8px;
  color: #333;
  text-decoration: none;
  position: relative;
}

.tab-content a::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: -2px;
  width: 0%;
  height: 1px;
  background: #106093;
  transition: 0.3s;
}

.tab-content a:hover {
  color: #106093;
}

.tab-content a:hover::after {
  width: 100%;
}

/* MOBILE */
@media(max-width: 991px){
  .mega-wrapper {
    position: static;
  }
}
</style>
</head>

<body>

<!-- MAIN NAVBAR -->
<nav class="navbar navbar-expand-lg bg-white shadow-sm">
  <div class="container">
    <a class="navbar-brand fw-bold">Nians</a>

    <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#mainNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="mainNav">
      <ul class="navbar-nav">

        <li class="nav-item">
          <a class="nav-link trigger-menu" data-target="digitalMenu">Digital Marketing</a>
        </li>

        <li class="nav-item">
          <a class="nav-link trigger-menu" data-target="odooMenu">Odoo</a>
        </li>

        <li class="nav-item"><a class="nav-link">Pricing</a></li>
        <li class="nav-item"><a class="nav-link">Resources</a></li>
        <li class="nav-item"><a class="nav-link">Support</a></li>

      </ul>
    </div>
  </div>
</nav>

<!-- DIGITAL MENU -->
<div id="digitalMenu" class="mega-wrapper bg-white shadow-sm">
  <div class="container py-4">
    <div class="mega-dropdown">

      <div class="row">
        <div class="col-md-3">
          <div class="nav flex-column nav-pills" id="digitalTabs">
            <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#d1">Organic Growth</button>
            <button class="nav-link" data-bs-toggle="pill" data-bs-target="#d2">Paid Media</button>
          </div>
        </div>

        <div class="col-md-9">
          <div class="tab-content">

            <div class="tab-pane fade show active" id="d1">
              <h6>Organic Growth</h6>
              <a href="#">SEO</a><br>
              <a href="#">Local SEO</a>
            </div>

            <div class="tab-pane fade" id="d2">
              <h6>Paid Media</h6>
              <a href="#">PPC Ads</a><br>
              <a href="#">SEM</a>
            </div>

          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- ODOO MENU -->
<div id="odooMenu" class="mega-wrapper bg-white shadow-sm">
  <div class="container py-4">
    <div class="mega-dropdown">

      <div class="row">
        <div class="col-md-3">
          <div class="nav flex-column nav-pills" id="odooTabs">
            <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#o1">Core</button>
            <button class="nav-link" data-bs-toggle="pill" data-bs-target="#o2">Modules</button>
          </div>
        </div>

        <div class="col-md-9">
          <div class="tab-content">

            <div class="tab-pane fade show active" id="o1">
              <h6>Core Services</h6>
              <a href="#">Implementation</a><br>
              <a href="#">Customization</a>
            </div>

            <div class="tab-pane fade" id="o2">
              <h6>Modules</h6>
              <a href="#">CRM</a><br>
              <a href="#">Accounting</a>
            </div>

          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
// SELECTORS
const triggers = document.querySelectorAll('.trigger-menu');
const menus = document.querySelectorAll('.mega-wrapper');

// CLOSE ALL
function closeAll() {
  menus.forEach(menu => menu.classList.remove('show'));
  triggers.forEach(t => t.classList.remove('active'));
}

// CLICK HANDLER
triggers.forEach(trigger => {
  trigger.addEventListener('click', function(e) {
    e.preventDefault();

    const targetId = this.getAttribute('data-target');
    const targetMenu = document.getElementById(targetId);

    const isOpen = targetMenu.classList.contains('show');

    closeAll();

    if (!isOpen) {
      targetMenu.classList.add('show');
      this.classList.add('active');
    }
  });
});

// OUTSIDE CLICK CLOSE
document.addEventListener('click', function(e) {
  if (!e.target.closest('.navbar') && !e.target.closest('.mega-wrapper')) {
    closeAll();
  }
});
</script>

</body>
</html>
