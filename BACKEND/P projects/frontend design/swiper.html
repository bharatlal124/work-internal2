<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Swiper -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">

    <title>Document</title>
    <style>
        .testimonial-section {
  padding: 80px 0;
  overflow: hidden;
}

.thumb-swiper {
  height: 300px;
  width: 220px;
}

.thumb-swiper .swiper-slide {
  display: flex;
  align-items: center;
  gap: 12px;
  opacity: 0.4;
  transform: translateX(-60px);
  transition: all 0.4s ease;
}

.thumb-swiper .swiper-slide-active {
  opacity: 1;
  transform: translateX(0);
}

.thumb-swiper .swiper-slide-prev {
  transform: translateX(-40px) rotate(-8deg);
}

.thumb-swiper .swiper-slide-next {
  transform: translateX(-40px) rotate(8deg);
}

.thumb-swiper img {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  object-fit: cover;
}

.thumb-swiper h6 {
  margin: 0;
  font-size: 14px;
  font-weight: 600;
}

.thumb-swiper span {
  font-size: 12px;
  color: #777;
}

/* Right content */
.testimonial-content {
  font-size: 20px;
  font-style: italic;
  color: #333;
  max-width: 520px;
}

    </style>
</head>
<body>
    
<section class="testimonial-section">
  <div class="container">
    <div class="row align-items-center">

      <!-- LEFT: CURVED THUMB SLIDER -->
      <div class="col-md-4">
        <div class="swiper thumb-swiper">
          <div class="swiper-wrapper">

            <div class="swiper-slide">
              <img src="https://randomuser.me/api/portraits/women/44.jpg">
              <h6>Diana Johnston</h6>
              <span>⭐ 4.9 on 29 Aug, 2017</span>
            </div>

            <div class="swiper-slide">
              <img src="https://randomuser.me/api/portraits/women/68.jpg">
              <h6>Lauren Contreras</h6>
              <span>⭐ 4.9 on 29 Aug, 2017</span>
            </div>

            <div class="swiper-slide">
              <img src="https://randomuser.me/api/portraits/men/32.jpg">
              <h6>Edward Alexander</h6>
              <span>⭐ 4.9 on 29 Aug, 2017</span>
            </div>

          </div>
        </div>
      </div>

      <!-- RIGHT: TESTIMONIAL CONTENT -->
      <div class="col-md-8">
        <div class="testimonial-content">
          <p>
            “ Been working with appscript for a number of years now with a variety
            of different apps. They have my recommendation. They are a great team.”
          </p>
        </div>
      </div>

    </div>
  </div>
</section>



    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<script>
const thumbSwiper = new Swiper(".thumb-swiper", {
  direction: "vertical",
  slidesPerView: 3,
  centeredSlides: true,
  loop: true,
  autoplay: {
    delay: 2500,
    disableOnInteraction: false,
  },
  speed: 800,
});
</script>

</body>
</html>
